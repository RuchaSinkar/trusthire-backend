server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/trusthire}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.cache.type=simple

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

app.whois.api-key=${WHOIS_API_KEY:disabled}
app.whois.base-url=https://www.whoisxmlapi.com/whoisserver/WhoisService
app.google.safe-browse.api-key=${GOOGLE_SAFE_BROWSE_API_KEY:disabled}
app.google.safe-browse.base-url=https://safebrowsing.googleapis.com/v4/threatMatches:find

app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

logging.level.com.example.demo=INFO
logging.level.org.springframework.security=WARN
