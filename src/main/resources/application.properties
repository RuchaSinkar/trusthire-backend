# Use Railway dynamic port
server.port=${PORT:8080}

# PostgreSQL (Railway will inject env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis (OPTIONAL - disable for now if not critical)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# APIs
app.whois.api-key=${WHOIS_API_KEY}
app.google.safe-browse.api-key=${GOOGLE_SAFE_BROWSE_API_KEY}

# CORS (update later after frontend deploy)
app.cors.allowed-origins=${CORS_ORIGIN:http://localhost:5173}

logging.level.com.example.demo=INFO
logging.level.org.springframework.security=WARN